name: Test S3 Access

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-s3:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: Test S3 bucket exists
      run: |
        echo "Testing if S3 bucket exists..."
        aws s3 ls s3://${{ secrets.S3_BUCKET_NAME }}
        
    - name: Test S3 upload (single file)
      run: |
        echo "Testing S3 upload..."
        echo "Test deployment $(date)" > test-file.txt
        aws s3 cp test-file.txt s3://${{ secrets.S3_BUCKET_NAME }}/test-file.txt
        
    - name: Test S3 list uploaded file
      run: |
        echo "Verifying file was uploaded..."
        aws s3 ls s3://${{ secrets.S3_BUCKET_NAME }}/test-file.txt
        
    - name: Clean up test file
      run: |
        echo "Cleaning up test file..."
        aws s3 rm s3://${{ secrets.S3_BUCKET_NAME }}/test-file.txt
        
    - name: S3 test complete
      run: |
        echo "✅ S3 access test successful!"
