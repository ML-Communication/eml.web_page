name: Debug Deploy to S3 and CloudFront

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: Debug - Check AWS CLI version
      run: |
        aws --version
        
    - name: Debug - Test AWS connection
      run: |
        echo "Testing AWS STS (Security Token Service)..."
        aws sts get-caller-identity
        
    - name: Debug - Check secrets
      run: |
        echo "AWS Region: ${{ secrets.AWS_REGION }}"
        echo "S3 Bucket: ${{ secrets.S3_BUCKET_NAME }}"
        echo "CloudFront Distribution: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
        
    - name: Debug - Test S3 access
      run: |
        echo "Testing S3 bucket access..."
        aws s3 ls s3://${{ secrets.S3_BUCKET_NAME }} --region ${{ secrets.AWS_REGION }}
        
    - name: Debug - Test CloudFront access
      run: |
        echo "Testing CloudFront access..."
        aws cloudfront get-distribution --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        
    - name: Debug - List files to sync
      run: |
        echo "Files that would be synced:"
        find . -type f ! -path "./.git/*" ! -path "./.github/*" ! -name "README.md" ! -name "*.md" ! -name ".gitignore"
