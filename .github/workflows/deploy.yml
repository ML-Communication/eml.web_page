name: Debug CloudFront Access

on:
  workflow_dispatch:

jobs:
  debug-cloudfront:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: Debug - Show CloudFront Distribution ID
      run: |
        echo "CloudFront Distribution ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
        
    - name: Debug - List all CloudFront distributions
      run: |
        echo "Listing all CloudFront distributions..."
        aws cloudfront list-distributions --region us-east-1 --output table
        
    - name: Debug - Try to get specific distribution
      run: |
        echo "Trying to get distribution details..."
        aws cloudfront get-distribution --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --region us-east-1 || echo "Failed to get distribution"
        
    - name: Debug - Test with different region approach
      run: |
        echo "Testing CloudFront without explicit region..."
        aws cloudfront get-distribution --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} || echo "Failed without region"
