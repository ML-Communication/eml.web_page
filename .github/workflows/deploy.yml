name: Test CloudFront Access

on:
  workflow_dispatch:

jobs:
  test-cloudfront:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: Test CloudFront distribution exists
      run: |
        echo "Testing CloudFront distribution..."
        aws cloudfront get-distribution --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        
    - name: Test CloudFront invalidation
      run: |
        echo "Testing CloudFront invalidation..."
        aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths "/test-file.txt"
        
    - name: CloudFront test complete
      run: |
        echo "✅ CloudFront access test successful!"
